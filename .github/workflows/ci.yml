# CI workflow — runs on every push and PR to main

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # For hatch-vcs

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run linter
        run: ruff check src/ tests/
        continue-on-error: true  # Don't fail the build on lint warnings initially

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=offline_search --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  integration:
    name: Integration (real kiwix-tools + real ZIMs)
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true   # download flakiness never blocks a merge

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Resolve latest kiwix-tools version
        id: kiwix_version
        run: |
          VERSION=$(python - <<'EOF'
          import urllib.request, xml.etree.ElementTree as ET, re, sys
          FALLBACK = "3.8.2"
          try:
              with urllib.request.urlopen(
                  "https://download.kiwix.org/release/kiwix-tools/feed.xml",
                  timeout=10
              ) as resp:
                  root = ET.fromstring(resp.read())
              ns = {"atom": "http://www.w3.org/2005/Atom"}
              titles = [e.text for e in root.findall(".//atom:entry/atom:title", ns) if e.text]
              versions = []
              for t in titles:
                  m = re.search(r"kiwix-tools[_-]linux-x86_64[_-](\d+\.\d+\.\d+)", t)
                  if m:
                      versions.append(tuple(int(x) for x in m.group(1).split(".")))
              if versions:
                  best = ".".join(str(x) for x in max(versions))
                  print(best)
                  sys.exit(0)
          except Exception as e:
              print(f"Feed parse failed ({e}), using fallback", file=sys.stderr)
          print(FALLBACK)
          EOF
          )
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved kiwix-tools version: $VERSION"

      - name: Download kiwix-tools
        run: |
          VERSION="${{ steps.kiwix_version.outputs.version }}"
          URL="https://download.kiwix.org/release/kiwix-tools/kiwix-tools_linux-x86_64-${VERSION}.tar.gz"
          echo "Downloading $URL"
          curl --retry 3 --retry-delay 5 --retry-connrefused -fL "$URL" -o kiwix-tools.tar.gz
          mkdir -p kiwix-tools
          tar -xzf kiwix-tools.tar.gz --strip-components=1 -C kiwix-tools
          echo "kiwix-manage version: $(kiwix-tools/kiwix-manage --version 2>&1 || true)"

      - name: Run integration tests (mock unit tests first, then happy flow)
        run: |
          # Step 1: full mock unit test suite — all edge cases must pass
          pytest tests/test_build_library.py -v
          # Step 2: real happy-flow with actual kiwix-manage + committed ZIM fixtures
          pytest tests/test_build_library_integration.py -v -m integration

  build:
    name: Verify Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Check wheel contents
        run: |
          pip install wheel
          python -m zipfile -l dist/*.whl
